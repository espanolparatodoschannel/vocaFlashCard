<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Francés Pro</title>
  <!-- Google Fonts: Manrope & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <!-- Estilos Externos -->
  <link rel="stylesheet" href="styles.css?v=2.0">
</head>

<body>
  <div class="header">
    <div class="filter-container">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')" title="Todas">📚</button>
      <button class="filter-btn" id="filter-pending" onclick="setFilter('pending')" title="Pendientes">⏳</button>
      <button class="filter-btn" id="filter-learned" onclick="setFilter('learned')" title="Aprendidas">✅</button>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="statsToggle" onclick="toggleView()" title="Estadísticas">📊</button>
      <button class="theme-toggle" id="themeToggle" title="Tema">🌓</button>
    </div>
  </div>

  <!-- Vista de Estadísticas (Oculta por defecto) -->
  <div class="container" id="statsContainer" style="display: none;">
    <div class="stats-view" id="statsView">
      <!-- Se genera dinámicamente -->
    </div>
  </div>

  <div class="container" id="studyContainer">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar palabra (Fr o Es)..." autocomplete="off">
      <button class="clear-search-btn" id="clearSearchBtn" title="Limpiar búsqueda" style="display: none;">✖</button>
      <span class="search-icon">🔍</span>
    </div>

    <div class="flashcard-wrapper" id="flashcardWrapper">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-front" id="flashcardFront">
          <!-- Palabra en francés -->
        </div>
        <div class="flashcard-back" id="flashcardBack">
          <!-- Significado y ejemplos -->
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="nav-buttons">
        <button class="btn-action" onclick="prevCard()" title="Anterior">
          <span class="icon">←</span>
        </button>
        <button class="btn-action" onclick="randomCard()" title="Aleatorio">
          <span class="icon">🎲</span>
        </button>
        <button class="btn-action" onclick="nextCard()" title="Siguiente">
          <span class="icon">→</span>
        </button>
      </div>
      <div class="counter-external" id="cardCounter">0 / 0</div>
    </div>

  </div>

  <!-- Lógica Externa -->
  <script src="script.js?v=1.3"></script>
</body>

</html>

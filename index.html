<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Francés Pro</title>
  <!-- Google Fonts: Manrope & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <!-- Estilos Externos -->
  <link rel="stylesheet" href="styles.css?v=2.0">
  <!-- Lucide Icons Library -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="header">
    <div class="filter-container">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')" title="Todas">
        <i data-lucide="layers"></i>
      </button>
      <button class="filter-btn" id="filter-pending" onclick="setFilter('pending')" title="Pendientes">
        <i data-lucide="clock"></i>
      </button>
      <button class="filter-btn" id="filter-learned" onclick="setFilter('learned')" title="Aprendidas">
        <i data-lucide="check-circle-2"></i>
      </button>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="statsToggle" onclick="toggleView()" title="Estadísticas">
        <i data-lucide="bar-chart-3"></i>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Tema">
        <i data-lucide="sun-moon"></i>
      </button>
    </div>
  </div>

  <!-- Vista de Estadísticas (Oculta por defecto) -->
  <div class="container" id="statsContainer" style="display: none;">
    <div class="stats-view" id="statsView">
      <!-- Se genera dinámicamente -->
    </div>
  </div>

  <div class="container" id="studyContainer">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar palabra (Fr o Es)..." autocomplete="off">
      <button class="clear-search-btn" id="clearSearchBtn" title="Limpiar búsqueda" style="display: none;">
        <i data-lucide="x"></i>
      </button>
      <i data-lucide="search" class="search-icon"></i>
    </div>

    <div class="flashcard-wrapper" id="flashcardWrapper">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-front" id="flashcardFront">
          <!-- Palabra en francés -->
        </div>
        <div class="flashcard-back" id="flashcardBack">
          <!-- Significado y ejemplos -->
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="nav-buttons-container">
        <button class="btn-action" onclick="prevCard()" title="Anterior">
          <i data-lucide="chevron-left"></i>
        </button>
        <button class="btn-action" onclick="randomCard()" title="Aleatorio">
          <i data-lucide="shuffle"></i>
        </button>
        <button class="btn-action" onclick="nextCard()" title="Siguiente">
          <i data-lucide="chevron-right"></i>
        </button>
        <div class="counter-external" id="cardCounter">0 / 0</div>
      </div>
    </div>

  </div>

  <!-- Lógica Externa -->
  <script src="script.js?v=1.3"></script>
</body>

</html>
